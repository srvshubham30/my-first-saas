<body>

    <div class="app-container">
        <header>
            <h1>🚀 Grind90 Custom SaaS</h1>
            <p>Create, manage, and track any challenge length dynamically.</p>
        </header>

        <div class="selector-card">
            <div class="selector-group">
                <label for="challenge-selector">Switch Challenge:</label>
                <select id="challenge-selector"></select>
            </div>
            <button class="btn btn-danger" id="delete-challenge-btn">🗑️ Delete Current</button>
        </div>

        <div class="create-form">
            <h3>Create New Challenge</h3>
            <div class="form-grid">
                <input type="text" id="new-challenge-name" placeholder="e.g., 95 days gym challenge">
                <select id="new-challenge-days">
                    <option value="21">21 Days (Short Habit)</option>
                    <option value="75">75 Days (Hard Challenge)</option>
                    <option value="90">90 Days (Quarterly Focus)</option>
                    <option value="365">365 Days (Yearly Grind)</option>
                    <!-- <option value="365" data-premium="true">💎 365 Days (Yearly Grind)</option> -->
                    <option value="720" >720 Days (Legends Grind)</option>
                </select>
                <button class="btn btn-primary" id="create-btn">➕ Create</button>
            </div>
        </div>

        <!-- Progress Dashboard Grid Overview -->
        <div class="dashboard-card">
            <h2 id="active-challenge-title">Loading Challenge...</h2>
            <div class="analytics-row">
                <div class="progress-container-box">
                    <div class="progress-bar-bg">
                        <div id="progress-bar" class="progress-bar-fill"></div>
                    </div>
                    <div class="progress-details">
                        <span id="progress-text">0 / 0 Days</span>
                        <span id="progress-percent">0%</span>
                    </div>
                </div>
                <!-- Live Total Volume Counter Added Here -->
                <div class="metric-total-badge">
                    <span>📊 Total Volume: <strong id="total-metric-count">0</strong></span>
                </div>
                <div class="streak-badge">
                    <span>🔥 Max Streak: <strong id="streak-count">0</strong> Days</span>
                </div>
            </div>
        </div>
        <div id="challenge-grid" class="calendar-grid"></div>
    </div>

    <div id="day-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">Update Progress: Day 1</h3>
                <span id="close-modal" class="close-icon">&times;</span>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="metric-input">Track Metric (e.g., Pages Read, Mins Logged)</label>
                    <input type="number" id="metric-input" placeholder="Enter number value">
                    <p id="autofill-hint" class="hint-text" style="display: none;">
                        💡 Pre-filled automatically from yesterday's value to save you time!
                    </p>
                </div>
                <div class="input-group">
                    <label for="note-input">Daily Log / Reflections</label>
                    <textarea id="note-input" rows="3"
                        placeholder="How did today's session feel? Any roadblocks?"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="clear-day-btn">Clear Day</button>
                <button class="btn btn-primary" id="save-day-btn">Confirm Status</button>
            </div>
        </div>
    </div>
